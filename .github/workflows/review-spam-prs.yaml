name: Review and Reject Spam PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  review-spam-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Review and reject spam PRs using Copilot
        uses: actions/github-script@v7
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
        with:
          script: |
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            // Label applied to non-spam PRs so subsequent runs skip them
            const REVIEWED_LABEL = 'spam-reviewed';

            // Games known not to work in iframes (must be rejected outright)
            const RESTRICTED_GAMES = [
              'free fire', 'freefire', 'roblox', 'minecraft', 'gta',
              'grand theft auto', 'fortnite', 'pubg',
            ];

            const isValidUrl = (str) => {
              if (!str) return false;
              try {
                const u = new URL(str);
                return u.protocol === 'http:' || u.protocol === 'https:';
              } catch {
                return false;
              }
            };

            const rejectPr = async (pr, reason) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '🤖 This pull request has been automatically identified as spam or low-quality',
                  'content and is being closed.',
                  '',
                  `**Reason:** ${reason}`,
                  '',
                  'If you believe this is a mistake, please open a new pull request with a',
                  'clear description of your changes.',
                ].join('\n'),
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });

              console.log(`Closed PR #${pr.number} as spam: ${reason}`);

              const issueMatch = (pr.body || '').match(/Close\s+#(\d+)/i);
              if (issueMatch) {
                const issueNumber = parseInt(issueMatch[1], 10);
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
                console.log(`Closed linked issue #${issueNumber} for PR #${pr.number}.`);
              }
            };

            // Ensure the reviewed label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: REVIEWED_LABEL,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: REVIEWED_LABEL,
                  color: '0075ca',
                  description: 'PR has been reviewed by the spam detection workflow',
                });
                console.log(`Created label '${REVIEWED_LABEL}'.`);
              }
            }

            const listOpts = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 100,
            };

            const [page1, page2] = await Promise.all([
              github.rest.pulls.list({ ...listOpts, page: 1 }),
              github.rest.pulls.list({ ...listOpts, page: 2 }),
            ]);

            const pullRequests = [...page1.data, ...page2.data];

            if (pullRequests.length === 0) {
              console.log('No open PRs to review.');
              return;
            }

            console.log(`Found ${pullRequests.length} open PR(s) to review.`);

            for (const pr of pullRequests) {
              // Skip PRs already reviewed in a previous run
              if (pr.labels.some(l => l.name === REVIEWED_LABEL)) {
                console.log(`Skipping PR #${pr.number}: already reviewed.`);
                continue;
              }

              console.log(`Reviewing PR #${pr.number}: "${pr.title}"`);

              await sleep(3000);

              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              // --- Rule-based checks on games.json changes ---
              const gamesJsonFile = files.find(f => f.filename === 'games.json');
              if (gamesJsonFile) {
                let headGames, baseGames;
                try {
                  const [headRes, baseRes] = await Promise.all([
                    github.rest.repos.getContent({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      path: 'games.json',
                      ref: pr.head.sha,
                    }),
                    github.rest.repos.getContent({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      path: 'games.json',
                      ref: pr.base.sha,
                    }),
                  ]);
                  headGames = JSON.parse(Buffer.from(headRes.data.content, 'base64').toString('utf8'));
                  baseGames = JSON.parse(Buffer.from(baseRes.data.content, 'base64').toString('utf8'));
                } catch (e) {
                  console.error(`Failed to fetch games.json for PR #${pr.number}: ${e.message}`);
                }

                if (headGames && baseGames) {
                  const baseIds = new Set(baseGames.map(g => g.id));
                  const baseMap = new Map(baseGames.map(g => [g.id, g]));
                  const changedGames = headGames.filter(g => {
                    if (!baseIds.has(g.id)) return true;
                    const base = baseMap.get(g.id);
                    return g.url !== base.url || g.icon !== base.icon;
                  });

                  for (const game of changedGames) {
                    if (!isValidUrl(game.url)) {
                      await rejectPr(pr, `Invalid URL in "url" field: "${game.url}"`);
                      break;
                    }
                    if (!isValidUrl(game.icon)) {
                      await rejectPr(pr, `Invalid URL in "icon" field: "${game.icon}"`);
                      break;
                    }
                    if (game.url === game.icon) {
                      await rejectPr(pr, `Game URL and icon share the same URL: "${game.url}"`);
                      break;
                    }
                    const nameLower = (game.name || '').toLowerCase();
                    const urlLower = (game.url || '').toLowerCase();
                    const searchText = `${nameLower} ${urlLower}`;
                    const restricted = RESTRICTED_GAMES.find(k => searchText.includes(k));
                    if (restricted) {
                      await rejectPr(pr, `"${game.name}" is a well-known game that does not support iframe embedding and cannot be added.`);
                      break;
                    }
                  }

                  // Check if the PR was already closed by a rule above
                  const { data: updatedPr } = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                  });
                  if (updatedPr.state === 'closed') continue;
                }
              }

              // --- AI-based analysis ---
              const filesSummary = files.map(f => `${f.filename} (${f.status})`).join(', ');

              const prContent = [
                `PR Title: ${pr.title}`,
                `PR Body: ${pr.body || '(empty)'}`,
                `Changed files: ${filesSummary || '(none)'}`,
                `Author: ${pr.user.login}`,
              ].join('\n');

              const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + process.env.MODELS_TOKEN,
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [
                    {
                      role: 'system',
                      content: [
                        'You are a spam detector for a GitHub repository that stores game resources',
                        '(game URLs, icons, names, and creators) for Win7 Simu.',
                        'Determine whether a pull request is spam, gibberish, or clearly low-quality.',
                        'A PR is spam if any of the following apply:',
                        '- The title or body is gibberish, random characters, or makes no sense',
                        '- It is an obvious test, joke, or troll PR',
                        '- The content is completely unrelated to adding or updating game resources',
                        '- It contains promotional, offensive, or clearly irrelevant content',
                        'Respond with ONLY a valid JSON object:',
                        '{"isSpam": true, "reason": "brief explanation"}',
                        'or {"isSpam": false, "reason": "looks legitimate"}',
                      ].join(' '),
                    },
                    {
                      role: 'user',
                      content: prContent,
                    },
                  ],
                  max_tokens: 150,
                  temperature: 0,
                }),
              });

              if (!response.ok) {
                console.error(`Failed to analyze PR #${pr.number}: ${response.status} ${response.statusText}`);
                continue;
              }

              const result = await response.json();
              const messageContent = result.choices?.[0]?.message?.content?.trim();

              if (!messageContent) {
                console.error(`No AI response received for PR #${pr.number}.`);
                continue;
              }

              let analysis;
              try {
                analysis = JSON.parse(messageContent);
              } catch (e) {
                console.error(`Could not parse AI response for PR #${pr.number}: ${messageContent}`);
                continue;
              }

              console.log(`PR #${pr.number}: isSpam=${analysis.isSpam}, reason=${analysis.reason}`);

              if (analysis.isSpam) {
                await rejectPr(pr, analysis.reason);
              } else {
                // Mark as reviewed so subsequent runs skip this PR
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: [REVIEWED_LABEL],
                });
                console.log(`PR #${pr.number} passed review. Added '${REVIEWED_LABEL}' label.`);
              }
            }
